<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدبلوماسي للسيارات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #ffffff;
            transition: background 0.5s;
        }

        body.rustaq { background: #0a0a0f; }
        body.rustaq .welcome-banner {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 30%, #0f1419 60%, #0a0a0f 100%);
            border-bottom: 2px solid rgba(233, 69, 96, 0.4);
        }
        body.rustaq .category-header.active { background: rgba(233, 69, 96, 0.15); border-bottom: 1px solid rgba(233, 69, 96, 0.3); }
        body.rustaq .category-name { color: #e94560; }
        body.rustaq .category-badge { background: rgba(233, 69, 96, 0.2); color: #e94560; }
        body.rustaq .branch-tab.active { background: rgba(233, 69, 96, 0.15); border-color: #e94560; color: #e94560; }
        body.rustaq .branch-title { color: #e94560; }
        body.rustaq .car-item:hover { border-color: rgba(233, 69, 96, 0.3); }
        body.rustaq .car-price-section { background: rgba(233, 69, 96, 0.1); border: 1px solid rgba(233, 69, 96, 0.2); }
        body.rustaq .car-price-value { color: #e94560; }

        body.mabela { background: #1a1a2e; }
        body.mabela .welcome-banner {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #1a1a2e 60%, #0f3460 100%);
            border-bottom: 2px solid rgba(0, 212, 255, 0.4);
        }
        body.mabela .category-header.active { background: rgba(0, 212, 255, 0.12); border-bottom: 1px solid rgba(0, 212, 255, 0.3); }
        body.mabela .category-name { color: #00d4ff; }
        body.mabela .category-badge { background: rgba(0, 212, 255, 0.15); color: #00d4ff; }
        body.mabela .branch-tab.active { background: rgba(0, 212, 255, 0.12); border-color: #00d4ff; color: #00d4ff; }
        body.mabela .branch-title { color: #00d4ff; }
        body.mabela .car-item:hover { border-color: rgba(0, 212, 255, 0.3); }
        body.mabela .car-price-section { background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); }
        body.mabela .car-price-value { color: #00d4ff; }

        .welcome-banner {
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02), rgba(255,255,255,0.04), rgba(255,255,255,0.02), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .welcome-banner h1 {
            font-size: 2.2em;
            font-weight: 900;
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.4), 0 0 60px rgba(233, 69, 96, 0.2);
            animation: glow 2s ease-in-out infinite alternate;
        }

        body.rustaq .welcome-banner h1 {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 30%, #ffd700 60%, #e94560 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        body.mabela .welcome-banner h1 {
            background: linear-gradient(135deg, #00d4ff 0%, #00b4d8 30%, #90e0ef 60%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.4), 0 0 60px rgba(0, 212, 255, 0.2);
        }

        @keyframes glow { 0% { filter: brightness(1); } 100% { filter: brightness(1.3); } }

        .welcome-banner .subtitle {
            color: #888;
            font-size: 0.85em;
            margin-top: 10px;
            position: relative;
            z-index: 1;
            letter-spacing: 8px;
        }

        .search-bar {
            max-width: 600px;
            margin: 0 auto 25px;
            padding: 0 20px;
            position: relative;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            right: 15px;
            font-size: 1.3em;
            color: #888;
            pointer-events: none;
            z-index: 2;
        }

        .search-input {
            width: 100%;
            padding: 15px 45px 15px 50px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1em;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        body.rustaq .search-input:focus {
            border-color: #e94560;
            box-shadow: 0 0 25px rgba(233, 69, 96, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        body.mabela .search-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-input::placeholder { color: #666; }

        .clear-search {
            position: absolute;
            left: 15px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.2em;
            cursor: pointer;
            padding: 5px;
            display: none;
            z-index: 2;
        }

        .clear-search:hover { color: #fff; }

        .search-results-count {
            text-align: center;
            color: #888;
            font-size: 0.85em;
            margin-top: 8px;
            display: none;
        }

        .branch-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 0 20px 25px;
            flex-wrap: wrap;
        }

        .branch-tab {
            padding: 18px 45px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.3em;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #888;
            transition: all 0.3s;
        }

        .branch-tab:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .branch-tab .car-count {
            display: block;
            font-size: 0.65em;
            margin-top: 5px;
            font-weight: normal;
        }

        .branch-title {
            text-align: center;
            font-size: 1.6em;
            margin: 25px 20px;
            font-weight: bold;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 30px; }

        .category-accordion {
            margin-bottom: 15px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
        }

        .category-header {
            padding: 20px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            user-select: none;
            background: rgba(255, 255, 255, 0.03);
        }

        .category-header:hover { background: rgba(255, 255, 255, 0.05); }

        .category-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-icon {
            font-size: 1.5em;
            transition: transform 0.3s;
        }

        .category-header.active .category-icon { transform: rotate(180deg); }

        .category-name { font-size: 1.4em; font-weight: bold; }

        .category-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-content.open { max-height: 5000px; }

        .cars-list { padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        .car-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s;
        }

        .car-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(-5px);
        }

        .car-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .car-detail-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1em;
        }

        .car-detail-label { color: #888; min-width: 100px; font-size: 0.9em; }
        .car-detail-value { color: #fff; font-weight: bold; font-size: 1.05em; }

        .car-price-section {
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .car-price-label { color: #aaa; font-size: 0.9em; }
        .car-price-value { font-weight: bold; font-size: 1.2em; }

        .whatsapp-section { display: flex; flex-direction: column; gap: 8px; }
        .whatsapp-section-label { color: #aaa; font-size: 0.8em; text-align: center; }
        .whatsapp-buttons { display: flex; gap: 10px; }

        .whatsapp-btn-1, .whatsapp-btn-2 {
            flex: 1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s;
            text-align: center;
        }

        .whatsapp-btn-1 { background: #075e54; }
        .whatsapp-btn-1:hover { background: #128C7E; box-shadow: 0 5px 20px rgba(37, 211, 102, 0.3); }
        .whatsapp-btn-2 { background: #1a6b5a; }
        .whatsapp-btn-2:hover { background: #0d9488; box-shadow: 0 5px 20px rgba(37, 211, 102, 0.3); }

        .loading-section { text-align: center; padding: 50px; color: #888; }

        @media (max-width: 768px) {
            .welcome-banner h1 { font-size: 1.8em; }
            .branch-tab { padding: 14px 30px; font-size: 1.1em; }
            .category-name { font-size: 1.1em; }
            .whatsapp-buttons { flex-direction: column; }
            .search-input { font-size: 0.9em; padding: 12px 40px 12px 45px; }
        }
    </style>
</head>
<body class="rustaq">
    <div class="welcome-banner">
        <h1>الدبلوماسي للسيارات</h1>
        <div class="subtitle">● DIPLOMAT CARS ●</div>
    </div>

    <div class="search-bar">
        <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن مركبة بالاسم، الموديل، أو السعر..." oninput="handleSearch()">
            <button class="clear-search" id="clearSearch" onclick="clearSearch()">✕</button>
        </div>
        <div class="search-results-count" id="searchResultsCount"></div>
    </div>

    <div class="branch-tabs">
        <div class="branch-tab active" onclick="switchBranch('rustaq')" id="tab-rustaq">
            🏛️ فرع الرستاق
            <span class="car-count" id="count-rustaq">0</span>
        </div>
        <div class="branch-tab" onclick="switchBranch('mabela')" id="tab-mabela">
            🏛️ فرع المعبيلة
            <span class="car-count" id="count-mabela">0</span>
        </div>
    </div>

    <div class="branch-title" id="branchTitle">🚗 سيارات فرع الرستاق</div>

    <div class="container" id="carsContainer">
        <div class="loading-section">جاري تحميل السيارات...</div>
    </div>

    <script>
        const SHEET_RUSTAQ = '1GYYo5T1iUlOtu_Qie2v_Me99l1yLivM2UrwLzW9Vpto';
        const SHEET_MABELA = '1MynVZ9abykJWym9GwzzJr0cRmYC4XenX7ReKNJpTwJE';
        
        const BRANCH_PHONES = {
            rustaq: ['96872222242', '96895096865'],
            mabela: ['96892256223', '96878080132']
        };
        
        let allCars = { rustaq: [], mabela: [] };
        let currentBranch = 'rustaq';
        let searchQuery = '';

        function openWhatsApp(car, phoneNumber) {
            const branchNames = { rustaq: 'فرع الرستاق', mabela: 'فرع المعبيلة' };
            const message = `السلام عليكم ورحمة الله وبركاته

أرغب في الاستفسار عن السيارة التالية من ${branchNames[car.branch]}:

🏭 *الفئة:* ${car.category}
🚗 *اسم المركبة:* ${car.name}
📅 *الموديل:* ${car.model}
🎨 *اللون:* ${car.color}
💰 *السعر:* ${car.priceText} ريال عماني

هل يمكنكم تزويدي بمزيد من المعلومات؟`;
            
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.carsData = {};

        function handleSearch() {
            const input = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearch');
            searchQuery = input.value.toLowerCase().trim();
            
            clearBtn.style.display = searchQuery ? 'block' : 'none';
            displayBranch(currentBranch);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').style.display = 'none';
            document.getElementById('searchResultsCount').style.display = 'none';
            searchQuery = '';
            displayBranch(currentBranch);
        }

        function filterCars(cars) {
            if (!searchQuery) return cars;
            
            return cars.filter(car => {
                if (car.name && car.name.toLowerCase().includes(searchQuery)) return true;
                if (car.model && car.model.toLowerCase().includes(searchQuery)) return true;
                if (car.priceText && car.priceText.toLowerCase().includes(searchQuery)) return true;
                if (car.category && car.category.toLowerCase().includes(searchQuery)) return true;
                if (car.color && car.color.toLowerCase().includes(searchQuery)) return true;
                return false;
            });
        }

        async function loadAllCars() {
            await loadBranchCars('rustaq', SHEET_RUSTAQ);
            await loadBranchCars('mabela', SHEET_MABELA);
            updateCounts();
            displayBranch(currentBranch);
        }

        function isCategoryHeader(cells) {
            const nonEmptyCells = cells.filter(c => c !== '');
            if (nonEmptyCells.length !== 1) return false;
            
            const text = cells[0]?.trim() || '';
            if (!text || text.length > 50) return false;
            if (/^\d+$/.test(text)) return false;
            if (/^(19|20)\d{2}$/.test(text)) return false;
            
            const colors = ['ابيض', 'أبيض', 'اسود', 'أسود', 'فضي', 'رصاصي', 'رمادي', 'احمر', 'أحمر', 'ازرق', 'أزرق', 'اخضر', 'أخضر', 'ذهبي', 'white', 'black', 'silver', 'gray', 'red', 'blue', 'green', 'gold'];
            if (colors.some(c => text.toLowerCase().includes(c.toLowerCase())) && text.length < 10) return false;
            
            return true;
        }

        async function loadBranchCars(branch, sheetId) {
            allCars[branch] = [];
            
            try {
                const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                const lines = csvText.split('\n');
                let currentCategory = null;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    
                    const cells = parseCSVLine(line);
                    const nonEmptyCells = cells.filter(c => c !== '');
                    if (nonEmptyCells.length === 0) continue;
                    
                    if (isCategoryHeader(cells)) {
                        currentCategory = cells[0].trim();
                        continue;
                    }
                    
                    // فقط أضف السيارة إذا كان هناك عنوان حالي
                    if (currentCategory && nonEmptyCells.length >= 2) {
                        const price = cells[0] || '';
                        const color = cells[1] || '';
                        const model = cells[2] || '';
                        const carName = cells[3] || '';
                        
                        allCars[branch].push({
                            category: currentCategory,
                            name: carName,
                            model: model,
                            color: color,
                            priceText: price,
                            branch: branch
                        });
                    }
                }
                
            } catch (error) {
                console.error(`❌ خطأ ${branch}:`, error);
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function groupCarsByCategory(cars) {
            const grouped = {};
            cars.forEach(car => {
                const category = car.category || 'أخرى';
                if (!grouped[category]) grouped[category] = [];
                grouped[category].push(car);
            });
            return grouped;
        }

        function toggleCategory(headerElement) {
            const content = headerElement.nextElementSibling;
            const isOpen = content.classList.contains('open');
            
            if (isOpen) {
                headerElement.classList.remove('active');
                content.classList.remove('open');
            } else {
                headerElement.classList.add('active');
                content.classList.add('open');
            }
        }

        function switchBranch(branch) {
            currentBranch = branch;
            document.body.className = branch;
            document.querySelectorAll('.branch-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${branch}`).classList.add('active');
            document.getElementById('branchTitle').textContent = 
                branch === 'rustaq' ? '🚗 سيارات فرع الرستاق' : '🚗 سيارات فرع المعبيلة';
            
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').style.display = 'none';
            document.getElementById('searchResultsCount').style.display = 'none';
            searchQuery = '';
            
            displayBranch(branch);
        }

        function updateCounts() {
            document.getElementById('count-rustaq').textContent = `${allCars.rustaq.length} سيارة`;
            document.getElementById('count-mabela').textContent = `${allCars.mabela.length} سيارة`;
        }

        function displayBranch(branch) {
            const cars = allCars[branch];
            const container = document.getElementById('carsContainer');
            const phones = BRANCH_PHONES[branch];
            
            const filteredCars = filterCars(cars);
            
            const resultsCount = document.getElementById('searchResultsCount');
            if (searchQuery) {
                resultsCount.style.display = 'block';
                resultsCount.textContent = `🔍 تم العثور على ${filteredCars.length} نتيجة لـ "${searchQuery}"`;
            } else {
                resultsCount.style.display = 'none';
            }
            
            if (filteredCars.length === 0) {
                container.innerHTML = searchQuery ? 
                    '<div class="loading-section">🔍 لا توجد نتائج مطابقة للبحث</div>' : 
                    '<div class="loading-section">🚫 لا توجد سيارات في هذا الفرع حالياً</div>';
                return;
            }
            
            const groupedCars = groupCarsByCategory(filteredCars);
            let html = '';
            let isFirst = true;
            
            for (const [category, categoryCars] of Object.entries(groupedCars)) {
                const isOpen = searchQuery ? true : isFirst;
                
                html += `
                <div class="category-accordion">
                    <div class="category-header ${isOpen ? 'active' : ''}" onclick="toggleCategory(this)">
                        <div class="category-title-group">
                            <span class="category-icon">▼</span>
                            <span class="category-name">🏭 ${category}</span>
                        </div>
                        <span class="category-badge">${categoryCars.length} سيارات</span>
                    </div>
                    <div class="category-content ${isOpen ? 'open' : ''}">
                        <div class="cars-list">
                            ${categoryCars.map((car, index) => {
                                const carKey = `${branch}-${index}`;
                                window.carsData[carKey] = car;
                                
                                return `
                                <div class="car-item">
                                    <div class="car-details">
                                        <div class="car-detail-row">
                                            <span class="car-detail-label">🚗 اسم المركبة:</span>
                                            <span class="car-detail-value">${highlightText(car.name || '---')}</span>
                                        </div>
                                        <div class="car-detail-row">
                                            <span class="car-detail-label">📅 الموديل:</span>
                                            <span class="car-detail-value">${highlightText(car.model || '---')}</span>
                                        </div>
                                        <div class="car-detail-row">
                                            <span class="car-detail-label">🎨 اللون:</span>
                                            <span class="car-detail-value">${highlightText(car.color || '---')}</span>
                                        </div>
                                    </div>
                                    
                                    <div class="car-price-section">
                                        <span class="car-price-label">💰 السعر:</span>
                                        <span class="car-price-value">${highlightText(car.priceText || 'السعر غير محدد')} ريال عماني</span>
                                    </div>
                                    
                                    <div class="whatsapp-section">
                                        <div class="whatsapp-section-label">📞 تواصل عبر واتساب:</div>
                                        <div class="whatsapp-buttons">
                                            <button class="whatsapp-btn-1" onclick="window.openWhatsApp(window.carsData['${carKey}'], '${phones[0]}')">💬 واتساب 1</button>
                                            <button class="whatsapp-btn-2" onclick="window.openWhatsApp(window.carsData['${carKey}'], '${phones[1]}')">💬 واتساب 2</button>
                                        </div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
                isFirst = false;
            }
            
            container.innerHTML = html;
        }

        function highlightText(text) {
            if (!searchQuery || !text) return text;
            const escapedQuery = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedQuery})`, 'gi');
            return text.replace(regex, '<mark style="background:#e94560;color:#fff;padding:0 3px;border-radius:3px;">$1</mark>');
        }

        loadAllCars();
        
        setInterval(() => {
            loadAllCars();
        }, 600000);
    </script>
</body>
</html>
