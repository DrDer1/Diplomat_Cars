<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدبلوماسي للسيارات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #ffffff;
        }

        .welcome-banner {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 30%, #0f1419 60%, #0a0a0f 100%);
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(233, 69, 96, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.03), rgba(233, 69, 96, 0.06), rgba(233, 69, 96, 0.03), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .welcome-banner h1 {
            font-size: 3em;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 30%, #c23152 60%, #e94560 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow { 0% { filter: brightness(1); } 100% { filter: brightness(1.3); } }

        .welcome-banner .subtitle {
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
            position: relative;
            z-index: 1;
            letter-spacing: 8px;
        }

        .branch-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 0 20px 25px;
            flex-wrap: wrap;
        }

        .branch-tab {
            padding: 18px 45px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.3em;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #888;
            transition: all 0.3s;
        }

        .branch-tab:hover {
            border-color: rgba(233, 69, 96, 0.3);
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .branch-tab.active {
            background: rgba(233, 69, 96, 0.15);
            border-color: #e94560;
            color: #e94560;
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.25);
        }

        .branch-tab .car-count {
            display: block;
            font-size: 0.65em;
            color: #666;
            margin-top: 5px;
            font-weight: normal;
        }

        .branch-tab.active .car-count { color: #e94560; opacity: 0.8; }

        .branch-title {
            text-align: center;
            font-size: 1.6em;
            margin: 25px 20px;
            color: #e94560;
            font-weight: bold;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 30px; }

        .category-accordion {
            margin-bottom: 15px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
        }

        .category-header {
            padding: 20px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            user-select: none;
            background: rgba(255, 255, 255, 0.03);
        }

        .category-header:hover { background: rgba(233, 69, 96, 0.08); }

        .category-header.active {
            background: rgba(233, 69, 96, 0.12);
            border-bottom: 1px solid rgba(233, 69, 96, 0.2);
        }

        .category-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-icon {
            font-size: 1.5em;
            transition: transform 0.3s;
        }

        .category-header.active .category-icon { transform: rotate(180deg); }

        .category-name { font-size: 1.4em; font-weight: bold; color: #e94560; }

        .category-badge {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-content.open { max-height: 5000px; }

        .cars-list { padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        .car-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s;
        }

        .car-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(233, 69, 96, 0.2);
            transform: translateX(-5px);
        }

        .car-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .car-detail-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1em;
        }

        .car-detail-label {
            color: #888;
            min-width: 100px;
            font-size: 0.9em;
        }

        .car-detail-value {
            color: #fff;
            font-weight: bold;
            font-size: 1.05em;
        }

        .car-price-section {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .car-price-label { color: #aaa; font-size: 0.9em; }
        .car-price-value { color: #e94560; font-weight: bold; font-size: 1.2em; }

        .whatsapp-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .whatsapp-section-label {
            color: #aaa;
            font-size: 0.8em;
            text-align: center;
        }

        .whatsapp-buttons {
            display: flex;
            gap: 10px;
        }

        .whatsapp-btn-1, .whatsapp-btn-2 {
            flex: 1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s;
            text-align: center;
        }

        .whatsapp-btn-1 {
            background: #075e54;
        }

        .whatsapp-btn-1:hover {
            background: #128C7E;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn-2 {
            background: #1a6b5a;
        }

        .whatsapp-btn-2:hover {
            background: #0d9488;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.3);
        }

        .loading-section { text-align: center; padding: 50px; color: #888; }

        @media (max-width: 768px) {
            .welcome-banner h1 { font-size: 2em; }
            .branch-tab { padding: 14px 30px; font-size: 1.1em; }
            .category-name { font-size: 1.1em; }
            .whatsapp-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="welcome-banner">
        <h1>الدبلوماسي للسيارات</h1>
        <div class="subtitle">● DIPLOMAT CARS ●</div>
    </div>

    <div class="branch-tabs">
        <div class="branch-tab active" onclick="switchBranch('rustaq')" id="tab-rustaq">
            🏛️ فرع الرستاق
            <span class="car-count" id="count-rustaq">0</span>
        </div>
        <div class="branch-tab" onclick="switchBranch('mabela')" id="tab-mabela">
            🏛️ فرع المعبيلة
            <span class="car-count" id="count-mabela">0</span>
        </div>
    </div>

    <div class="branch-title" id="branchTitle">🚗 سيارات فرع الرستاق</div>

    <div class="container" id="carsContainer">
        <div class="loading-section">جاري تحميل السيارات...</div>
    </div>

    <script>
        const SHEET_RUSTAQ = '1GYYo5T1iUlOtu_Qie2v_Me99l1yLivM2UrwLzW9Vpto';
        const SHEET_MABELA = '1MynVZ9abykJWym9GwzzJr0cRmYC4XenX7ReKNJpTwJE';
        
        // أرقام التواصل لكل فرع
        const BRANCH_PHONES = {
            rustaq: ['96895096865', '96872222242'],
            mabela: ['96892256223', '96878080132']
        };
        
        const RUSTAQ_CATEGORIES = [
            'نيسان', 'كامري', 'لكزس', 'تويوتا', 'هوندا', 'هايونداي', 'أخرى'
        ];
        
        const MABELA_CATEGORIES = [
            'نيسان', 'لكزس', 'لينكولن', 'تويوتا', 'كامري', 'مرسيدس',
            'هونداي', 'كيا', 'هوندا', 'شيفروليه', 'فوورد', 'أخرى'
        ];
        
        let allCars = { rustaq: [], mabela: [] };
        let currentBranch = 'rustaq';

        function openWhatsApp(car, phoneNumber) {
            const branchNames = { rustaq: 'فرع الرستاق', mabela: 'فرع المعبيلة' };
            const message = `السلام عليكم ورحمة الله وبركاته

أرغب في الاستفسار عن السيارة التالية من ${branchNames[car.branch]}:

🏭 *الفئة:* ${car.category}
🚗 *اسم المركبة:* ${car.name}
📅 *الموديل:* ${car.model}
🎨 *اللون:* ${car.color}
💰 *السعر:* ${car.priceText} ريال عماني

هل يمكنكم تزويدي بمزيد من المعلومات؟`;
            
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        window.carsData = {};

        async function loadAllCars() {
            await loadBranchCars('rustaq', SHEET_RUSTAQ, RUSTAQ_CATEGORIES);
            await loadBranchCars('mabela', SHEET_MABELA, MABELA_CATEGORIES);
            updateCounts();
            displayBranch(currentBranch);
        }

        function normalizeText(text) {
            return text.trim().replace(/\s+/g, ' ');
        }

        function isCategoryHeader(firstCell, nonEmptyCount, categoryList) {
            if (nonEmptyCount !== 1) return false;
            const normalized = normalizeText(firstCell);
            return categoryList.some(name => normalizeText(name) === normalized);
        }

        async function loadBranchCars(branch, sheetId, categoryList) {
            allCars[branch] = [];
            
            try {
                const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                const lines = csvText.split('\n');
                let currentCategory = null;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    
                    const cells = parseCSVLine(line);
                    const nonEmptyCells = cells.filter(c => c !== '');
                    
                    if (nonEmptyCells.length === 0) continue;
                    
                    const firstCell = cells[0]?.trim() || '';
                    
                    if (isCategoryHeader(firstCell, nonEmptyCells.length, categoryList)) {
                        currentCategory = normalizeText(firstCell);
                        continue;
                    }
                    
                    if (currentCategory && nonEmptyCells.length >= 2) {
                        const price = cells[0] || '';
                        const color = cells[1] || '';
                        const model = cells[2] || '';
                        const carName = cells[3] || '';
                        
                        allCars[branch].push({
                            category: currentCategory,
                            name: carName,
                            model: model,
                            color: color,
                            priceText: price,
                            branch: branch
                        });
                    }
                }
                
            } catch (error) {
                console.error(`❌ خطأ ${branch}:`, error);
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function groupCarsByCategory(cars) {
            const grouped = {};
            cars.forEach(car => {
                const category = car.category || 'أخرى';
                if (!grouped[category]) grouped[category] = [];
                grouped[category].push(car);
            });
            return grouped;
        }

        function toggleCategory(headerElement) {
            const content = headerElement.nextElementSibling;
            const isOpen = content.classList.contains('open');
            
            if (isOpen) {
                headerElement.classList.remove('active');
                content.classList.remove('open');
            } else {
                headerElement.classList.add('active');
                content.classList.add('open');
            }
        }

        function switchBranch(branch) {
            currentBranch = branch;
            document.querySelectorAll('.branch-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${branch}`).classList.add('active');
            document.getElementById('branchTitle').textContent = 
                branch === 'rustaq' ? '🚗 سيارات فرع الرستاق' : '🚗 سيارات فرع المعبيلة';
            displayBranch(branch);
        }

        function updateCounts() {
            document.getElementById('count-rustaq').textContent = `${allCars.rustaq.length} سيارة`;
            document.getElementById('count-mabela').textContent = `${allCars.mabela.length} سيارة`;
        }

        function displayBranch(branch) {
            const cars = allCars[branch];
            const container = document.getElementById('carsContainer');
            const phones = BRANCH_PHONES[branch];
            
            if (cars.length === 0) {
                container.innerHTML = '<div class="loading-section">🚫 لا توجد سيارات في هذا الفرع حالياً</div>';
                return;
            }
            
            const groupedCars = groupCarsByCategory(cars);
            let html = '';
            let isFirst = true;
            
            for (const [category, categoryCars] of Object.entries(groupedCars)) {
                html += `
                <div class="category-accordion">
                    <div class="category-header ${isFirst ? 'active' : ''}" onclick="toggleCategory(this)">
                        <div class="category-title-group">
                            <span class="category-icon">▼</span>
                            <span class="category-name">🏭 ${category}</span>
                        </div>
                        <span class="category-badge">${categoryCars.length} سيارات</span>
                    </div>
                    <div class="category-content ${isFirst ? 'open' : ''}">
                        <div class="cars-list">
                            ${categoryCars.map((car, index) => {
                                const carKey = `${branch}-${index}`;
                                window.carsData[carKey] = car;
                                
                                return `
                                <div class="car-item">
                                    <div class="car-details">
                                        <div class="car-detail-row">
                                            <span class="car-detail-label">🚗 اسم المركبة:</span>
                                            <span class="car-detail-value">${car.name || '---'}</span>
                                        </div>
                                        <div class="car-detail-row">
                                            <span class="car-detail-label">📅 الموديل:</span>
                                            <span class="car-detail-value">${car.model || '---'}</span>
                                        </div>
                                        <div class="car-detail-row">
                                            <span class="car-detail-label">🎨 اللون:</span>
                                            <span class="car-detail-value">${car.color || '---'}</span>
                                        </div>
                                    </div>
                                    
                                    <div class="car-price-section">
                                        <span class="car-price-label">💰 السعر:</span>
                                        <span class="car-price-value">${car.priceText || 'السعر غير محدد'} ريال عماني</span>
                                    </div>
                                    
                                    <div class="whatsapp-section">
                                        <div class="whatsapp-section-label">📞 تواصل عبر واتساب:</div>
                                        <div class="whatsapp-buttons">
                                            <button class="whatsapp-btn-1" onclick="window.openWhatsApp(window.carsData['${carKey}'], '${phones[0]}')">💬 واتساب 1</button>
                                            <button class="whatsapp-btn-2" onclick="window.openWhatsApp(window.carsData['${carKey}'], '${phones[1]}')">💬 واتساب 2</button>
                                        </div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
                isFirst = false;
            }
            
            container.innerHTML = html;
        }

        // تحميل أول مرة
        loadAllCars();
        
        // تحديث تلقائي كل 10 دقائق
        setInterval(() => {
            loadAllCars();
        }, 600000);
    </script>
</body>
</html>
